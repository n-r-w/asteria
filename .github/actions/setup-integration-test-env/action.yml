name: Setup integration test environment
description: Install external language servers required by integration tests

runs:
  using: composite
  steps:
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: "22"

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"

    - name: Set up Rust toolchain
      uses: dtolnay/rust-toolchain@stable
      with:
        components: rust-analyzer,rust-src

    - name: Set up PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: "8.3"

    - name: Add tool paths
      shell: bash
      run: |
        python_user_base="$(python -c 'import site; print(site.USER_BASE)')"

        echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"
        echo "$HOME/.local/bin" >> "$GITHUB_PATH"
        echo "${python_user_base}/bin" >> "$GITHUB_PATH"
        echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

    - name: Install Linux system packages
      if: runner.os == 'Linux'
      shell: bash
      run: |
        set -euo pipefail

        sudo apt-get update
        sudo apt-get install -y clangd unzip

    - name: Install macOS system packages
      if: runner.os == 'macOS'
      shell: bash
      run: |
        set -euo pipefail

        if ! command -v clangd >/dev/null; then
          brew install llvm
          echo "$(brew --prefix llvm)/bin" >> "$GITHUB_PATH"
        fi

    - name: Install language servers
      shell: bash
      run: |
        set -euo pipefail

        go install golang.org/x/tools/gopls@latest
        npm install -g typescript-language-server@5.1.3 typescript
        python -m pip install --user basedpyright

        mkdir -p "$HOME/.local/bin"

        curl -fsSL -o "$HOME/.local/bin/phpactor" \
          https://github.com/phpactor/phpactor/releases/latest/download/phpactor.phar
        chmod +x "$HOME/.local/bin/phpactor"

        case "${RUNNER_OS}/${RUNNER_ARCH}" in
          Linux/X64)
            marksman_asset="marksman-linux-x64"
            ;;
          Linux/ARM64)
            marksman_asset="marksman-linux-arm64"
            ;;
          macOS/*)
            marksman_asset="marksman-macos"
            ;;
          *)
            echo "unsupported runner for marksman: ${RUNNER_OS}/${RUNNER_ARCH}" >&2
            exit 1
            ;;
        esac

        curl -fsSL -o "$HOME/.local/bin/marksman" \
          "https://github.com/artempyanykh/marksman/releases/latest/download/${marksman_asset}"
        chmod +x "$HOME/.local/bin/marksman"

    - name: Verify executables
      shell: bash
      run: |
        set -euo pipefail

        command -v gopls
        command -v typescript-language-server
        command -v marksman
        command -v basedpyright-langserver
        command -v clangd
        command -v phpactor
        command -v rust-analyzer

    - name: Print tool versions
      shell: bash
      run: |
        set -euo pipefail

        gopls version | cat
        typescript-language-server --version
        marksman --version
        basedpyright --version
        clangd --version | head -n 1
        phpactor --version
        rust-analyzer --version
