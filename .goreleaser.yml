# .goreleaser.yml configuration for asteria
# This file defines how GoReleaser builds and releases the project

version: 2

builds:
  - env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
    binary: asteria-mcp
    main: ./cmd/asteria-mcp
    ldflags:
      - -s -w

archives:
  - name_template: >-
      {{ .ProjectName }}-
      {{- .Version }}-
      {{- .Os }}-
      {{- .Arch }}

checksum:
  name_template: "SHA256SUMS"
  algorithm: sha256

homebrew_casks:
  - name: asteria-mcp
    binaries:
      - asteria-mcp
    commit_msg_template: "Brew cask update for {{ .ProjectName }} version {{ .Tag }}"
    homepage: "https://github.com/n-r-w/asteria"
    description: "MCP server for symbolic code search over multiple language servers."
    repository:
      owner: n-r-w
      name: homebrew-tap
      branch: main
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  use: github
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - "^ci:"
  groups:
    - title: Features
      regexp: "^.*feat[(\\w)]*:+.*$"
      order: 0
    - title: "Bug fixes"
      regexp: "^.*fix[(\\w)]*:+.*$"
      order: 1
    - title: Others
      order: 999

release:
  github:
    owner: n-r-w
    name: asteria
  draft: false
  prerelease: auto
  name_template: "{{.ProjectName}} v{{.Version}}"
